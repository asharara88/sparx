# Pipeline CI: typecheck + full vitest suite. ffmpeg is installed so the real
# render/probe/clip paths run instead of gracefully skipping.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install ffmpeg (real render path in tests)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
